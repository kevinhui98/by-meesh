kind = "web"
previewPath = "/"
title = "Catering Manager"
version = "1.0.0"
id = "artifacts/catering-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22189

[services.development]
run = "pnpm --filter @workspace/catering-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catering-app", "run", "build" ]
publicDir = "artifacts/catering-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22189"
BASE_PATH = "/"
